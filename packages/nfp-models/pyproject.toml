[project]
name = "nfp-models"
version = "0.1.0"
description = "Bayesian state space model for nowcasting U.S. employment growth"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "nfp-lookups",
    "nfp-ingest",
    "nfp-vintages",
    "arviz>=0.23.4",
    "matplotlib>=3.7.0",
    "numba>=0.63.1",
    "numpy>=1.24.0,<2.4",
    "nutpie",
    "polars>=0.20.0",
    "pymc>=5.10.0",
    "pytensor>=2.18.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0.0",
    "tomli-w>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
nfp-lookups = { workspace = true }
nfp-ingest = { workspace = true }
nfp-vintages = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/nfp_models"]
