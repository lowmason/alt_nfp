[project]
name = "nfp-ingest"
version = "0.1.0"
description = "Data ingestion, vintage store, and panel construction for NFP"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "nfp-lookups",
    "nfp-download",
    "numpy>=1.24.0,<2.4",
    "polars>=0.20.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
nfp-lookups = { workspace = true }
nfp-download = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/nfp_ingest"]
