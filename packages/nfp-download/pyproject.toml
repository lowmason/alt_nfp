[project]
name = "nfp-download"
version = "0.1.0"
description = "HTTP clients and scrapers for downloading BLS and FRED data"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "nfp-lookups",
    "beautifulsoup4>=4.12.0",
    "httpx[http2]>=0.24.0",
    "lxml>=4.9.0",
    "polars>=0.20.0",
    "requests>=2.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
nfp-lookups = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/nfp_download"]
